
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Fieldset Example</h1>
     <fieldset>
           <legend>Extra form inputs</legend>
           <label for="">Color Picker:</label>
           <input type="color" name="" id="">
           <br><br>
           <label for="">Select Range</label>
           <input type="number" name="" id="">
           <br><br>
           <label for="">Date time</label>
           <input type="datetime-local" name="" id="">
     </fieldset>
     <h2>Progress bar example</h2>
     <progress min="0" max="100" value="70"></progress>
     <br>
      <progress min="0" max="100" value="100"></progress>
</body>
</html>
